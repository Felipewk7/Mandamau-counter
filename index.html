<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandamau Counter</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Flash effect backdrop -->
    <div id="screen-flash" class="screen-flash"></div>

    <!-- Ambient particles -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="card">
            <!-- Top Controls (Theme & Sound Selection) -->
            <div class="top-controls">
                <div class="theme-selector">
                    <button class="theme-btn theme-btn-cosmic active" title="Midnight Cosmic" data-theme="cosmic"></button>
                    <button class="theme-btn theme-btn-cyberpunk" title="Cyberpunk Neon" data-theme="cyberpunk"></button>
                    <button class="theme-btn theme-btn-infernal" title="Crimson Infernal" data-theme="infernal"></button>
                    <button class="theme-btn theme-btn-synthwave" title="Synthwave Retro" data-theme="synthwave"></button>
                    <button class="theme-btn theme-btn-gold" title="Golden Demiurge" data-theme="gold"></button>
                </div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button id="btn-music" class="btn-sound" title="Alternar música">
                        <svg viewBox="0 0 24 24" id="music-icon-on"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h6V3h-8z"/></svg>
                        <svg viewBox="0 0 24 24" id="music-icon-off" style="display:none;"><path d="M4.27 3L3 4.27l9 9v1.28c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4v-1.73l6 6 1.27-1.27L4.27 3zM14 7h4V3h-6v3.18l2 2V7z"/></svg>
                    </button>
                    <button id="btn-sound" class="btn-sound" title="Alternar som">
                        <svg viewBox="0 0 24 24" id="sound-icon-on"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                        <svg viewBox="0 0 24 24" id="sound-icon-off" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                    </button>
                </div>
            </div>

            <h1 class="title">
                Mandamau Counter
                <span class="subtitle">for Bako The FurryGuy</span>
            </h1>

            <!-- DMC Style Rank Badge -->
            <div id="rank-container" class="rank-container">
                <span id="rank-badge" class="rank-badge">D</span>
                <span id="rank-name" class="rank-name">Dull</span>
            </div>

            <!-- Tabs Navigation -->
            <div class="tabs-nav">
                <button id="tab-counter" class="tab-btn active">Contador</button>
                <button id="tab-stats" class="tab-btn">Estatísticas</button>
            </div>
            
            <!-- Tab Content: Counter -->
            <div id="content-counter" class="tab-content active">
                <div class="counter-container">
                    <!-- Combo Style Badge -->
                    <div id="combo-container" class="combo-container" style="display: none;">
                        <span id="combo-badge" class="combo-badge">Combo x1.0</span>
                    </div>
                    <span id="counter" class="counter-value">0</span>
                </div>

                <!-- Custom Multiplier Controls -->
                <div class="multiplier-settings">
                    <label for="multiplier-input">Multiplicar por:</label>
                    <div class="input-wrapper">
                        <button id="btn-dec-mult" class="btn-step">-</button>
                        <input type="number" id="multiplier-input" value="2" min="1" step="1">
                        <button id="btn-inc-mult" class="btn-step">+</button>
                    </div>
                </div>

                <div class="button-group">
                    <button id="btn-sum" class="btn btn-sum">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Somar (+1)
                    </button>
                    <button id="btn-mul" class="btn btn-mul">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        <span id="btn-mul-text">Multiplicar (x2)</span>
                    </button>
                </div>
            </div>

            <!-- Tab Content: Statistics -->
            <div id="content-stats" class="tab-content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-label">Recorde Máximo</span>
                        <span id="stat-high-score" class="stat-value">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Sem Mentiras Há</span>
                        <span id="stat-time-since" class="stat-value">0s</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Cliques Totais</span>
                        <span id="stat-total-clicks" class="stat-value">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Frequência (LPM)</span>
                        <span id="stat-lpm" class="stat-value">0.0</span>
                    </div>
                </div>
                <div class="stat-last-lie">
                    <span class="stat-label">Última Mentira Registrada</span>
                    <span id="stat-last-time" class="stat-value-sub">Nenhuma ainda</span>
                </div>
            </div>

            <button id="btn-reset" class="btn-reset">
                <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                Zerar
            </button>
        </div>
    </div>

    <!-- Beautiful custom confirmation modal -->
    <div id="modal-container" class="modal-container">
        <div class="modal-card">
            <div class="modal-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            </div>
            <h2>Confirmação</h2>
            <p id="modal-question" class="modal-question">Tem certeza que quer apagar?</p>
            <div class="modal-buttons">
                <button id="btn-modal-cancel" class="btn-modal btn-modal-secondary">Não</button>
                <button id="btn-modal-confirm" class="btn-modal btn-modal-primary">Sim</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
